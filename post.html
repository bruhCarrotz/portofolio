<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .post-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 7rem 2rem 6rem;
      min-height: 100vh;
    }

    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      margin-bottom: 3rem;
      transition: color 0.2s;
    }

    .post-back::before { content: '←'; font-size: 14px; }
    .post-back:hover { color: var(--ink); }

    .post-body h1 { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; line-height: 1.15; margin-bottom: 0.5rem; }
    .post-body h2 { font-family: var(--serif); font-size: 1.6rem; font-weight: 300; margin: 2.5rem 0 0.75rem; }
    .post-body h3 { font-family: var(--serif); font-size: 1.25rem; font-weight: 400; margin: 2rem 0 0.5rem; }
    .post-body p  { font-size: 16px; line-height: 1.9; margin-bottom: 1.15rem; }
    .post-body ul,
    .post-body ol { margin: 0.75rem 0 1.25rem 1.5rem; font-size: 16px; line-height: 1.85; }
    .post-body li { margin-bottom: 0.35rem; }
    .post-body strong { font-weight: 500; }
    .post-body em { font-style: italic; color: var(--ink-muted); }
    .post-body code { font-family: monospace; font-size: 13px; background: #fff; border: 1px solid var(--border); padding: 2px 6px; border-radius: 2px; }
    .post-body blockquote { border-left: 2px solid var(--accent); padding: 0.25rem 0 0.25rem 1.25rem; color: var(--ink-muted); font-style: italic; margin: 1.5rem 0; }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    .post-error { padding: 3rem 0; color: var(--ink-muted); font-size: 15px; }
    .post-error a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Your Name</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#blog" class="active">Writing</a></li>
  </ul>
</nav>

<main class="post-page">
  <a class="post-back" href="index.html#blog">All Writing</a>
  <article class="post-body" id="post-body">
    <p style="color:var(--ink-faint);font-size:14px;">Loading…</p>
  </article>
</main>

<footer>
  <span>&copy; 2024 Your Name</span>
  <ul class="footer-links">
    <li><a href="https://linkedin.com/in/yourhandle" target="_blank">LinkedIn</a></li>
    <li><a href="https://github.com/yourusername" target="_blank">GitHub</a></li>
    <li><a href="mailto:you@email.com">Email</a></li>
  </ul>
</footer>

<script src="posts.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const body = document.getElementById('post-body');

  const post = POSTS.find(p => p.slug === slug);

  if (!post) {
    body.innerHTML =
      '<div class="post-error">Post not found.' +
      '<br><br><a href="index.html#blog">← Back to Writing</a></div>';
  } else {
    document.title = post.title + ' — Your Name';
    body.innerHTML = parseMarkdown(post.content.trim());
  }

  function parseMarkdown(md) {
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
      .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
      .replace(/^---$/gm, '<hr/>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\> (.+)$/gm, '<blockquote>$1</blockquote>');

    return html.split(/\n\n+/).map(function(block) {
      const t = block.trim();
      if (!t) return '';
      if (/^<(h[1-6]|hr|blockquote|ul|ol|li)/.test(t)) return t;
      const lines = t.split('\n');
      const liItems = lines
        .filter(l => /^[-*] /.test(l))
        .map(l => '<li>' + l.replace(/^[-*] /, '') + '</li>');
      if (liItems.length === lines.length) return '<ul>' + liItems.join('') + '</ul>';
      return '<p>' + t.replace(/\n/g, ' ') + '</p>';
    }).join('\n');
  }
</script>
</body>
</html>
